<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выживальщик Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; overflow:hidden; }
        #app { max-width:500px; margin:0 auto; }
        .header { padding:12px; background:#111; }
        .header h1 { margin:0; font-size:23px; }
        .tab-bar { display:flex; background:#111; padding:8px 10px; gap:6px; overflow-x:auto; }
        .tab { flex:1; min-width:80px; padding:14px 6px; background:#222; border-radius:12px; font-size:14px; font-weight:bold; color:#ccc; }
        .tab.active { background:#aaaaaa; color:#000; }
        #mainScreen { padding:10px 15px; }
        #survivalPoints { font-size:54px; font-weight:bold; color:#ffd700; margin:5px 0 4px; text-shadow:0 0 25px #ffd700; }
        #passiveIncome { font-size:18px; color:#00ffaa; margin-bottom:15px; }
        #tapArea { 
            width:290px; height:290px; margin:10px auto 25px; 
            background: linear-gradient(to bottom, #ffffff 0% 33.3%, #0039a6 33.3% 66.6%, #da291c 66.6% 100%);
            border-radius:50%; font-size:125px; line-height:290px; cursor:pointer; 
            box-shadow:0 0 0 4px #000, 0 0 70px #da291c; 
            transition:transform 0.08s; position:relative; overflow:hidden; 
        }
        #tapArea:active { transform:scale(0.72) rotate(-5deg); }
        .ripple { position:absolute; width:60px; height:60px; background:rgba(255,255,255,0.4); border-radius:50%; transform:translate(-50%,-50%); animation:rippleAnim 0.6s forwards; pointer-events:none; }
        @keyframes rippleAnim { to { transform:translate(-50%,-50%) scale(3); opacity:0; } }
        
        /* УЛУЧШЕННЫЙ ВИЗУАЛ ЦИФР */
        .floating { 
            position:absolute; 
            color:#ffd700; 
            font-size:38px; 
            font-weight:900; 
            text-shadow: 
                0 0 8px #ffd700,
                0 0 20px #ffd700,
                0 0 35px #ffaa00;
            pointer-events:none; 
            animation:floatUp 1.35s forwards; 
            transform-origin:center;
        }
        @keyframes floatUp { 
            0%   { opacity:0; transform:translateY(20px) scale(0.6) rotate(-8deg); }
            15%  { opacity:1; transform:translateY(0) scale(1.35) rotate(3deg); }
            40%  { transform:translateY(-40px) scale(1.1) rotate(-2deg); }
            100% { opacity:0; transform:translateY(-170px) scale(0.85) rotate(6deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🐻 Выживальщик Tap</h1>
        </div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab(0)">🛡️ Спасение</button>
            <button class="tab" onclick="switchTab(1)">🔥 Стрик</button>
            <button class="tab" onclick="switchTab(2)">👥 Друзья</button>
            <button class="tab" onclick="switchTab(3)">🚀 Прокачка</button>
        </div>

        <div id="survivalPoints">0</div>
        <div id="passiveIncome">+0.5/сек</div>

        <div id="tapArea">🐻</div>

        <!-- ВКЛАДКИ (как раньше) -->
        <div id="tab0" class="content active">...</div>
        <!-- остальные вкладки без изменений -->
    </div>

    <script>
        // (весь твой предыдущий JS без изменений, только createFloatingText улучшен)
        let points = localStorage.getItem('survivalPoints') ? parseInt(localStorage.getItem('survivalPoints')) : 0;
        let streak = localStorage.getItem('streak') ? parseInt(localStorage.getItem('streak')) : 1;
        let friends = localStorage.getItem('friends') ? parseInt(localStorage.getItem('friends')) : 0;
        let coinsPerTap = 1;
        let coinsPerSecond = 0.5;
        let tapUpgradeCost = 100;
        let farmUpgradeCost = 150;
        const tg = window.Telegram.WebApp || { ready:()=>{}, expand:()=>{}, HapticFeedback: {impactOccurred:()=>{}} };

        tg.ready(); tg.expand();

        setInterval(() => { points += coinsPerSecond; updateUI(); }, 1000);

        function updateUI() {
            document.getElementById('survivalPoints').textContent = Math.floor(points);
            document.getElementById('passiveIncome').textContent = `+${coinsPerSecond.toFixed(1)}/сек`;
        }

        function tap(e) {
            if (!e) e = { touches: [{ clientX: 0, clientY: 0 }] };
            const touches = e.touches || [e];
            const rect = document.getElementById('tapArea').getBoundingClientRect();

            touches.forEach(touch => {
                points += coinsPerTap;

                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                createFloatingText(coinsPerTap, x, y);
            });

            tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function createFloatingText(amount, x, y) {
            const area = document.getElementById('tapArea');
            const rect = area.getBoundingClientRect();
            const text = document.createElement('div');
            text.className = 'floating';
            text.textContent = `+${Math.floor(amount)}`;
            text.style.left = (rect.left + x - 18) + 'px';
            text.style.top = (rect.top + y - 35) + 'px';
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1450);
        }

        // Остальные функции (referral, upgradeTap, switchTab и т.д.) — копируй из предыдущего кода

        const tapArea = document.getElementById('tapArea');
        tapArea.addEventListener('click', tap);
        tapArea.addEventListener('touchstart', (e) => { e.preventDefault(); tap(e); });

        updateUI();
    </script>
</body>
</html>
