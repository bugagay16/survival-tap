<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выживальщик Tap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; overflow:hidden; }
        #app { max-width:500px; margin:0 auto; }
        .header { padding:12px; background:#111; }
        .header h1 { margin:0; font-size:23px; }
        .tab-bar { display:flex; background:#111; padding:8px 10px; gap:6px; overflow-x:auto; }
        .tab { flex:1; min-width:80px; padding:14px 6px; background:#222; border-radius:12px; font-size:14px; font-weight:bold; color:#ccc; transition:0.3s; text-align:center; }
        .tab.active { background:#aaaaaa; color:#000; }
        #mainScreen { padding:10px 15px; }
        #survivalPoints { font-size:54px; font-weight:bold; color:#ffd700; margin:5px 0 4px; text-shadow:0 0 25px #ffd700; }
        #passiveIncome { font-size:18px; color:#00ffaa; margin-bottom:15px; }
        #tapArea { width:290px; height:290px; margin:10px auto 25px; background: linear-gradient(to bottom, #ffffff 0% 33.3%, #0039a6 33.3% 66.6%, #da291c 66.6% 100%); border-radius:50%; font-size:125px; line-height:290px; cursor:pointer; box-shadow:0 0 0 4px #000, 0 0 70px #da291c; transition:transform 0.1s; position:relative; overflow:hidden; }
        #tapArea:active { transform:scale(0.72) rotate(-5deg); }
        .floating { position:absolute; color:#ffd700; font-size:30px; font-weight:bold; pointer-events:none; animation:floatUp 1.3s forwards; }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-160px)} }
        .content { display:none; padding:0 15px; }
        .content.active { display:block; }
        .section-title { font-size:18px; color:#00ffaa; margin:15px 0 12px; text-align:left; }
        .big-btn { width:100%; padding:18px; margin:8px 0; border-radius:14px; font-size:17px; font-weight:bold; border:none; }
        .referral-btn { background:#00ccff; color:#000; }
        .upgrade-btn { background:#00ffaa; color:#000; }
        .save-btn { background:#aaaaaa; color:#000; font-weight:bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🐻 Выживальщик Tap</h1>
        </div>

        <!-- ТАБ-БАР (5 вкладок) -->
        <div class="tab-bar">
            <button class="tab active" onclick="switchTab(0)">🐻 Игра</button>
            <button class="tab" onclick="switchTab(1)">🔥 Стрик</button>
            <button class="tab" onclick="switchTab(2)">👥 Друзья</button>
            <button class="tab" onclick="switchTab(3)">🚀 Прокачка</button>
            <button class="tab" onclick="switchTab(4)">🛡️ Спасение</button>
        </div>

        <div id="survivalPoints">0</div>
        <div id="passiveIncome">+0.5/сек</div>

        <!-- ТАП (всегда на главном экране) -->
        <div id="tapArea" onclick="tap()">🐻</div>

        <!-- ВКЛАДКИ -->

        <!-- 0. Игра -->
        <div id="tab0" class="content active"></div>

        <!-- 1. Стрик -->
        <div id="tab1" class="content">
            <div class="section-title">🔥 Текущий стрик</div>
            <button onclick="showStreakDetails()" class="big-btn" style="background:#ff4444;color:#fff;font-size:24px;padding:30px;">Стрик: <span id="streakBig">1</span> дней 🔥</button>
        </div>

        <!-- 2. Друзья -->
        <div id="tab2" class="content">
            <div class="section-title">👥 Приглашённые друзья</div>
            <button onclick="showFriendsDetails()" class="big-btn" style="background:#00ccff;color:#000;font-size:22px;padding:25px;">Приглашено: <span id="friendsBig">0</span></button>
        </div>

        <!-- 3. Прокачка (отдельная вкладка) -->
        <div id="tab3" class="content">
            <div class="section-title">🚀 Прокачка</div>
            <button onclick="referral()" class="big-btn referral-btn">Пригласить друга (+400)</button>
            <button onclick="upgradeTap()" id="upgradeTapBtn" class="big-btn upgrade-btn">Прокачка тапа (+1) — 100</button>
            <button onclick="upgradeFarm()" id="upgradeFarmBtn" class="big-btn upgrade-btn">Прокачка фарма (+0.5/сек) — 150</button>
        </div>

        <!-- 4. Спасение -->
        <div id="tab4" class="content">
            <div class="section-title">🛡️ Спасение ТГ</div>
            <button onclick="showTabContent(1)" class="big-btn save-btn">Прокси</button>
            <button onclick="showTabContent(2)" class="big-btn save-btn">Алёрты</button>
            <button onclick="showTabContent(3)" class="big-btn save-btn">Бэкап чатов</button>
        </div>
    </div>

    <script>
        let points = localStorage.getItem('survivalPoints') ? parseInt(localStorage.getItem('survivalPoints')) : 0;
        let streak = localStorage.getItem('streak') ? parseInt(localStorage.getItem('streak')) : 1;
        let friends = localStorage.getItem('friends') ? parseInt(localStorage.getItem('friends')) : 0;
        let lastLogin = localStorage.getItem('lastLogin');
        let coinsPerTap = 1;
        let coinsPerSecond = 0.5;
        let tapUpgradeCost = 100;
        let farmUpgradeCost = 150;
        const today = new Date().toDateString();
        const tg = window.Telegram.WebApp || { ready:()=>{}, expand:()=>{}, HapticFeedback: {impactOccurred:()=>{}} };

        tg.ready(); tg.expand();

        if (lastLogin !== today) {
            let multiplier = streak >= 5 ? 4 : streak >= 4 ? 3 : streak >= 3 ? 2.25 : streak >= 2 ? 1.5 : 1;
            points += Math.floor(100 * multiplier);
            if (streak % 7 === 0) points += 500;
            streak++;
            localStorage.setItem('streak', streak);
            localStorage.setItem('lastLogin', today);
        }

        setInterval(() => { 
            points += coinsPerSecond; 
            updateUI(); 
        }, 1000);

        function updateUI() {
            document.getElementById('survivalPoints').textContent = Math.floor(points);
            document.getElementById('passiveIncome').textContent = `+${coinsPerSecond.toFixed(1)}/сек`;
            document.getElementById('streakBig').textContent = streak;
            document.getElementById('friendsBig').textContent = friends;
            document.getElementById('upgradeTapBtn').textContent = `Прокачка тапа (+1) — ${tapUpgradeCost}`;
            document.getElementById('upgradeFarmBtn').textContent = `Прокачка фарма (+0.5/сек) — ${farmUpgradeCost}`;
            localStorage.setItem('survivalPoints', points);
        }

        function tap() {
            points += coinsPerTap;
            const area = document.getElementById('tapArea');
            area.classList.add('ripple');
            setTimeout(() => area.classList.remove('ripple'), 400);
            createFloatingText(coinsPerTap);
            tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function createFloatingText(amount) {
            const area = document.getElementById('tapArea');
            const rect = area.getBoundingClientRect();
            const text = document.createElement('div');
            text.className = 'floating';
            text.textContent = `+${Math.floor(amount)}`;
            text.style.left = (rect.left + rect.width/2 - 15) + 'px';
            text.style.top = (rect.top + rect.height/2 - 30) + 'px';
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 1400);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
        }

        function showTabContent(n) {
            const names = ["Прокси", "Алёрты", "Бэкап"];
            const costs = [500,800,1200];
            if (points < costs[n-1]) return alert(`Нужно ещё ${costs[n-1]} очков!`);
            if (!confirm(`Потратить ${costs[n-1]} на ${names[n-1]}?`)) return;
            points -= costs[n-1];
            updateUI();
            alert(`✅ ${names[n-1]} активирован!`);
        }

        function showStreakDetails() {
            alert(`🔥 Текущий стрик: ${streak} дней\n\nМаксимальный: ${Math.max(streak,7)} дней`);
        }

        function showFriendsDetails() {
            alert(`👥 Приглашено друзей: ${friends}\n\nДо бонуса осталось: ${Math.max(0,5-friends)}`);
        }

        function referral() {
            const refLink = `https://t.me/SurvivalTapBot?start=ref_test`;
            navigator.clipboard.writeText(refLink).then(() => {
                friends++; points += 400; updateUI();
                alert(`🎉 +400 очков (друзей: ${friends})`);
            });
        }

        function upgradeTap() {
            if (points < tapUpgradeCost) return alert('Мало очков!');
            if (!confirm(`Улучшить за ${tapUpgradeCost}?`)) return;
            points -= tapUpgradeCost; coinsPerTap += 1; tapUpgradeCost = Math.floor(tapUpgradeCost * 1.5);
            updateUI();
        }

        function upgradeFarm() {
            if (points < farmUpgradeCost) return alert('Мало очков!');
            if (!confirm(`Улучшить за ${farmUpgradeCost}?`)) return;
            points -= farmUpgradeCost; coinsPerSecond += 0.5; farmUpgradeCost = Math.floor(farmUpgradeCost * 1.5);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
